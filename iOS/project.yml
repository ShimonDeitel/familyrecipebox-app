name: Familyrecipebox
options:
  bundleIdPrefix: com.shimondeitel.familyrecipebox
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Familyrecipebox:
    type: application
    platform: iOS
    sources:
      - path: Familyrecipebox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.familyrecipebox
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Familyrecipebox/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FamilyrecipeboxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FamilyrecipeboxTests
      - path: Familyrecipebox.storekit
    dependencies:
      - target: Familyrecipebox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.familyrecipebox.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FamilyrecipeboxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FamilyrecipeboxUITests
    dependencies:
      - target: Familyrecipebox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.familyrecipebox.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Familyrecipebox:
    build:
      targets:
        Familyrecipebox: all
        FamilyrecipeboxTests: [test]
        FamilyrecipeboxUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Familyrecipebox.storekit
    test:
      config: Debug
      storeKitConfiguration: Familyrecipebox.storekit
      targets:
        - FamilyrecipeboxTests
        - FamilyrecipeboxUITests
    archive:
      config: Release
