<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Recipe Box</title>
<style>
  body { margin:0; background:#2E2118; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .wrap { max-width:640px; padding:48px 24px; text-align:center; }
  h1 { font-size:2.4rem; margin-bottom:0.5rem; color:#C97B3D; }
  p.tagline { font-size:1.2rem; opacity:0.85; margin-bottom:2rem; }
  .feature { background:rgba(255,255,255,0.05); border-radius:14px; padding:20px; margin-bottom:16px; text-align:left; }
  .feature h3 { margin:0 0 6px 0; color:#C97B3D; }
  a.link { color:#C97B3D; text-decoration:none; }
  footer { margin-top:32px; font-size:0.85rem; opacity:0.6; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #C97B3D55 0%, #C97B3D00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Family Recipe Box</h1>
  <p class="tagline">Save handwritten family recipes so they never get lost between generations.</p>
  <div class="feature"><h3>Free</h3><p>Store recipe text and photo per entry</p></div>
  <div class="feature"><h3>Pro</h3><p>Recipe categorization and printable recipe-card export</p></div>
  <footer>
    <a class="link" href="privacy.html">Privacy Policy</a> &middot;
    <a class="link" href="terms.html">Terms of Use</a><br>
    Contact: s0533495227@gmail.com
  </footer>
</div>
</body>
</html>
